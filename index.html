<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional To-Do List</title>
    <style>
        /* 1. UPDATED COLORS & GRADIENTS */
        :root {
            --primary: #6366f1;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card: rgba(30, 41, 59, 0.7); /* Translucent for glass effect */
            --text: #f8fafc;
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg-gradient); /* 2. CHANGED to gradient background */
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center; /* 3. CENTERED vertically on screen */
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(10px); /* 4. ADDED glass blur effect */
            padding: 2.5rem;
            border-radius: 24px; /* 5. ROUNDED corners more for modern look */
            border: 1px solid rgba(255, 255, 255, 0.1); /* 6. ADDED subtle border */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
        }

        h1 { 
            font-size: 1.8rem; 
            font-weight: 800; 
            margin-bottom: 2rem; 
            text-align: center; 
            letter-spacing: -0.025em;
        }

        .input-group { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 2rem; 
        }

        input {
            flex-grow: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: var(--input-bg);
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        /* 7. ADDED Focus state for input */
        input:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        /* 8. ADDED hover lift effect */
        button:hover { 
            opacity: 0.9; 
            transform: translateY(-1px);
        }

        ul { list-style: none; padding: 0; }

        li {
            background: rgba(51, 65, 85, 0.5);
            margin-bottom: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .delete-btn { 
            background: rgba(239, 68, 68, 0.2); 
            color: #ef4444;
            padding: 6px 12px; 
            font-size: 12px; 
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Task Manager</h1>
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="Add a new task...">
        <button onclick="addTask()">Add Task</button>
    </div>
    <ul id="todo-list"></ul>
</div>

<script>
    function addTask() {
        const input = document.getElementById('todo-input');
        const list = document.getElementById('todo-list');
        
        if (input.value.trim() === '') return;

        const li = document.createElement('li');
        li.innerHTML = `
            <span>${input.value}</span>
            <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>
        `;
        
        list.appendChild(li);
        input.value = '';
    }

    document.getElementById('todo-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addTask();
    });
</script>

</body>
</html>
